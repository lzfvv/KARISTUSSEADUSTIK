let valitud = [];
let amtnik  = "";
let sihtmark = "";

/* ── LOGIN ── */
function enter() {
  amtnik   = document.getElementById("amtnikInput").value.trim()   || "Anonüümne ametnik";
  sihtmark = document.getElementById("sihtmarkInput").value.trim() || "Tundmatu isik";
  openApp();
}
function skip() {
  amtnik   = "Anonüümne ametnik";
  sihtmark = "Tundmatu isik";
  openApp();
}
function openApp() {
  document.getElementById("loginOverlay").style.display = "none";
  document.getElementById("heroBanner").style.display   = "flex";
  document.getElementById("searchBar").style.display    = "block";
  document.getElementById("mainLayout").style.display   = "grid";

  document.getElementById("heroMeta").innerHTML =
    `👮 <span>${amtnik}</span> &nbsp;·&nbsp; 🎯 <span>${sihtmark}</span>`;
  document.getElementById("sbTarget").textContent  = sihtmark;
  document.getElementById("sbOfficer").textContent = amtnik;

  renderFilters();
  render();
}

/* ── CATEGORY FILTER BUTTONS ── */
function renderFilters() {
  const cont = document.getElementById("catFilters");
  cont.innerHTML = "";
  const makeBtn = (label, id) => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (id === "kõik" ? " active" : "");
    b.dataset.cat = id;
    b.textContent = label;
    b.onclick = () => setFilter(id);
    cont.appendChild(b);
  };
  makeBtn("Kõik", "kõik");
  seadustik.forEach(c => makeBtn(c.nimi.replace(/^\S+ /, ""), c.id));
}

let activeFilter = "kõik";
function setFilter(id) {
  activeFilter = id;
  document.querySelectorAll(".cat-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.cat === id));
  render();
}

/* ── BADGE HELPERS ── */
function getBadges(p) {
  let h = "";
  if (p.trahv  > 0) h += `<span class="badge badge-trahv">TRAHV</span>`;
  if (p.vangla > 0) h += `<span class="badge badge-vangistus">VANGISTUS</span>`;
  if (p.arest  > 0) h += `<span class="badge badge-arest">AREST</span>`;
  if (p.litsents)   h += `<span class="badge badge-litsents">LITSENTS</span>`;
  return h || `<span class="badge badge-hoiatus">HOIATUS</span>`;
}

function penaltyLine(p) {
  let parts = [];
  if (p.trahv  > 0) parts.push(`${p.trahv.toLocaleString("et")}€ trahv`);
  if (p.vangla > 0) parts.push(`${p.vangla} min vangistust`);
  if (p.arest  > 0) parts.push(`${p.arest} min arest`);
  if (p.litsents)   parts.push("litsents tühistatakse");
  return parts.join(" + ") || "Hoiatus";
}

/* ── RENDER CATALOG ── */
function render() {
  const q = (document.getElementById("searchInput")?.value || "").toLowerCase();
  const cat = document.getElementById("catalog");
  cat.innerHTML = "";
  let found = false;

  seadustik.forEach((c, ci) => {
    if (activeFilter !== "kõik" && activeFilter !== c.id) return;
    const items = c.paragrahvid.filter(p =>
      p.kood.toLowerCase().includes(q) ||
      p.nimi.toLowerCase().includes(q)  ||
      String(p.trahv).includes(q)
    );
    if (!items.length) return;
    found = true;

    const sec = document.createElement("div");
    sec.className = "category-section";
    sec.style.animationDelay = (ci * 0.05) + "s";
    sec.innerHTML = `<div class="category-title">${c.nimi}</div><div class="grid"></div>`;
    const grid = sec.querySelector(".grid");

    items.forEach((p, pi) => {
      const card = document.createElement("div");
      card.className = "law-card";
      card.style.animationDelay = (ci * 0.05 + pi * 0.03) + "s";
      card.innerHTML = `
        <div class="card-top">
          <span class="para-code">${p.kood}</span>
          <div class="badges">${getBadges(p)}</div>
        </div>
        <div class="card-title">${p.nimi}</div>
        <div class="card-penalty">${penaltyLine(p)}</div>
        <button class="btn-add" onclick='addItem(${JSON.stringify(p)})'>+ Lisa rikkumine</button>
      `;
      grid.appendChild(card);
    });
    cat.appendChild(sec);
  });

  if (!found) {
    cat.innerHTML = `<div class="no-results">Otsingule "${q}" ei leitud ühtegi paragrahvi.</div>`;
  }
}

/* ── ADD / REMOVE ── */
function addItem(p) {
  valitud.push(p);
  updateSidebar();
  bumpCount();
  showToast(`✓ ${p.kood} lisatud`);
}
function removeItem(idx) {
  valitud.splice(idx, 1);
  updateSidebar();
}
function clearAll() {
  valitud = [];
  updateSidebar();
}

function bumpCount() {
  const el = document.getElementById("sbCount");
  el.classList.remove("bump");
  void el.offsetWidth;
  el.classList.add("bump");
}

/* ── SIDEBAR UPDATE ── */
function updateSidebar() {
  const list  = document.getElementById("sbList");
  const count = document.getElementById("sbCount");
  const tCount = document.getElementById("tCount");
  const tMoney = document.getElementById("tMoney");
  const jWrap  = document.getElementById("jailBadgesWrap");
  const jBadges= document.getElementById("jailBadges");

  count.textContent  = valitud.length;
  tCount.textContent = valitud.length;

  let money = 0, hasJail = false, hasArest = false;
  valitud.forEach(p => {
    money += p.trahv  || 0;
    if (p.vangla > 0) hasJail  = true;
    if (p.arest  > 0) hasArest = true;
  });

  tMoney.textContent = money.toLocaleString("et") + "€";

  // Jail badges — just labels, no time
  if (hasJail || hasArest) {
    jBadges.innerHTML = "";
    if (hasJail)  jBadges.innerHTML += `<span class="jail-badge vang">VANGISTUS</span>`;
    if (hasArest) jBadges.innerHTML += `<span class="jail-badge ar">AREST</span>`;
    jWrap.style.display = "block";
  } else {
    jWrap.style.display = "none";
  }

  if (!valitud.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><div>Ükski rikkumine pole valitud</div></div>`;
    return;
  }

  list.innerHTML = "";
  valitud.forEach((p, idx) => {
    const div = document.createElement("div");
    div.className = "sb-item";
    div.innerHTML = `
      <span class="sb-code">${p.kood}</span>
      <span class="sb-name">${p.nimi}</span>
      <span class="sb-fine">${p.trahv > 0 ? p.trahv.toLocaleString("et") + "€" : ""}</span>
      <button class="btn-rm" onclick="removeItem(${idx})" title="Eemalda">✕</button>
    `;
    list.appendChild(div);
  });
}

/* ── COPY REPORT ── */
function copyRaport() {
  if (!valitud.length) { showToast("❌ Ükski rikkumine pole valitud"); return; }

  const kuupäev = new Date().toLocaleString("et-EE", {
    day:"2-digit", month:"2-digit", year:"2-digit",
    hour:"2-digit", minute:"2-digit"
  });

  let money = 0;
  valitud.forEach(p => { money += p.trahv || 0; });

  let text = "";
  text += `Kuupäev:       ${kuupäev}\n`;
  text += `Ametnik:       ${amtnik}\n`;
  text += `Kahtlustatav: ${sihtmark}\n`;
  text += `RIKKUMISED (${valitud.length} tk):\n`;
  valitud.forEach((p, i) => {
    text += `  ${i + 1}. ${p.kood} — ${p.nimi}\n`;
    text += `     ${penaltyLine(p)}\n`;
  });
  text += `Trahv: ${money.toLocaleString("et")}€\n`;

  navigator.clipboard.writeText(text).then(() =>
    showToast("✓ Raport kopeeritud lõikelauale!"));
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

/* ── ENTER KEY on login ── */
document.addEventListener("keydown", e => {
  if (e.key === "Enter" &&
      document.getElementById("loginOverlay").style.display !== "none") enter();
});
</script>
